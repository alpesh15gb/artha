services:
  db:
    image: postgres:15-alpine
    container_name: artha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artha123}
      POSTGRES_DB: ${POSTGRES_DB:-artha_db}
    volumes:
      - artha_postgres:/var/lib/postgresql/data
    networks:
      - artha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: artha-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-artha}:${POSTGRES_PASSWORD:-artha123}@db:5432/${POSTGRES_DB:-artha_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3083:3001"
    networks:
      - artha-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: artha-web
    restart: unless-stopped
    ports:
      - "3082:80"
    networks:
      - artha-network

networks:
  artha-network:

volumes:
  artha_postgres: