services:
  db:
    image: postgres:15-alpine
    container_name: artha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artha123}
      POSTGRES_DB: ${POSTGRES_DB:-artha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: artha-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-artha}:${POSTGRES_PASSWORD:-artha123}@db:5432/${POSTGRES_DB:-artha_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app/apps/api
      - uploads:/app/apps/api/uploads
    networks:
      - artha-network

  client:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: artha-web
    restart: unless-stopped
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
    networks:
      - artha-network

  nginx:
    image: nginx:alpine
    container_name: artha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - client
    networks:
      - artha-network

networks:
  artha-network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
