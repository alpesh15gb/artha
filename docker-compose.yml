services:
  db:
    image: postgres:15-alpine
    container_name: artha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artha123}
      POSTGRES_DB: ${POSTGRES_DB:-artha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artha-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: artha-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-artha}:${POSTGRES_PASSWORD:-artha123}@db:5432/${POSTGRES_DB:-artha_db}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - artha-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: artha-client
    restart: unless-stopped
    networks:
      - artha-network

  nginx:
    image: nginx:alpine
    container_name: artha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - client
    networks:
      - artha-network

networks:
  artha-network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
